<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feature Engineering Agent</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 1.5rem; }
    label { display: block; margin-top: 12px; font-weight: bold; }
    input[type="text"], input[type="number"] { width: 100%; padding: 6px; box-sizing: border-box; }
    input[type="file"] { margin-top: 4px; }
    button { margin-top: 16px; padding: 8px 20px; font-size: 1rem; cursor: pointer; }
    #status-div { margin-top: 20px; padding: 10px; background: #f0f0f0; border-radius: 4px; display: none; }
    #results-div { margin-top: 24px; display: none; }
    table { border-collapse: collapse; width: 100%; margin-top: 12px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background: #e8e8e8; }
  </style>
</head>
<body>
  <h1>Feature Engineering Agent</h1>

  <form id="run-form">
    <label for="file">CSV Dataset</label>
    <input type="file" id="file" name="file" accept=".csv" required />

    <label for="target_col">Target Column Name</label>
    <input type="text" id="target_col" name="target_col" placeholder="e.g. churn" required />

    <label for="max_iter">Max Iterations</label>
    <input type="number" id="max_iter" name="max_iter" value="5" min="1" max="10" />

    <button type="submit" id="run-btn">Run Agent</button>
  </form>

  <div id="status-div">
    <strong>Status:</strong> <span id="status-text">idle</span> &nbsp;|&nbsp;
    <strong>Iteration:</strong> <span id="iteration-text">0</span>
  </div>

  <div id="results-div">
    <h2>Results</h2>
    <p>
      <strong>Baseline AUC:</strong> <span id="baseline-auc">—</span> &nbsp;&nbsp;
      <strong>Final AUC:</strong> <span id="final-auc">—</span>
    </p>
    <h3>Kept Features</h3>
    <table id="features-table">
      <thead>
        <tr><th>Name</th><th>Hypothesis</th><th>SHAP Value</th></tr>
      </thead>
      <tbody id="features-body"></tbody>
    </table>
  </div>

  <script>
    let pollInterval = null;

    document.getElementById('run-form').addEventListener('submit', async function (e) {
      e.preventDefault();

      const fileInput = document.getElementById('file');
      const targetCol = document.getElementById('target_col').value;
      const maxIter = document.getElementById('max_iter').value;

      if (!fileInput.files[0]) return;

      const formData = new FormData();
      formData.append('file', fileInput.files[0]);
      formData.append('target_col', targetCol);
      formData.append('max_iter', maxIter);

      document.getElementById('run-btn').disabled = true;
      document.getElementById('results-div').style.display = 'none';
      document.getElementById('status-div').style.display = 'block';
      document.getElementById('status-text').textContent = 'starting…';
      document.getElementById('iteration-text').textContent = '0';

      try {
        await fetch('/run', { method: 'POST', body: formData });
      } catch (err) {
        document.getElementById('status-text').textContent = 'error: ' + err.message;
        document.getElementById('run-btn').disabled = false;
        return;
      }

      pollInterval = setInterval(pollStatus, 2000);
    });

    async function pollStatus() {
      try {
        const resp = await fetch('/status');
        const data = await resp.json();
        document.getElementById('status-text').textContent = data.status;
        document.getElementById('iteration-text').textContent = data.iteration;

        if (data.status === 'complete') {
          clearInterval(pollInterval);
          pollInterval = null;
          document.getElementById('run-btn').disabled = false;
          await loadTrace();
        }
      } catch (err) {
        console.error('Status poll error:', err);
      }
    }

    async function loadTrace() {
      try {
        const resp = await fetch('/trace');
        const data = await resp.json();
        renderTrace(data.trace);
      } catch (err) {
        console.error('Trace fetch error:', err);
      }
    }

    function renderTrace(trace) {
      const resultsDiv = document.getElementById('results-div');
      if (!trace || trace.length === 0) {
        resultsDiv.style.display = 'block';
        document.getElementById('baseline-auc').textContent = '—';
        document.getElementById('final-auc').textContent = '—';
        return;
      }

      const baseline = trace.find(e => e.status === 'baseline');
      const iterations = trace.filter(e => e.status !== 'baseline');
      const kept = iterations.filter(e => e.decision === 'kept');

      const baselineAuc = baseline ? baseline.auc.toFixed(4) : '—';
      const lastKept = kept[kept.length - 1];
      const finalAuc = lastKept ? lastKept.auc_after.toFixed(4) : (baseline ? baseline.auc.toFixed(4) : '—');

      document.getElementById('baseline-auc').textContent = baselineAuc;
      document.getElementById('final-auc').textContent = finalAuc;

      const tbody = document.getElementById('features-body');
      tbody.innerHTML = '';
      kept.forEach(function (rec) {
        const shap = rec.shap_summary && rec.shap_summary.ranked_features
          ? (rec.shap_summary.ranked_features.find(f => f.feature_name === rec.feature_name) || {}).mean_abs_shap
          : null;
        const tr = document.createElement('tr');
        tr.innerHTML =
          '<td>' + escHtml(rec.feature_name) + '</td>' +
          '<td>' + escHtml(rec.hypothesis) + '</td>' +
          '<td>' + (shap !== undefined && shap !== null ? shap.toFixed(4) : '—') + '</td>';
        tbody.appendChild(tr);
      });

      resultsDiv.style.display = 'block';
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
